<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Speedrun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            touch-action: none;
        }
        canvas {
            image-rendering: pixelated;
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.8), 0 0 20px rgba(34, 211, 238, 0.4);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }
        .control-btn {
            -webkit-tap-highlight-color: transparent;
        }
        #leaderboard-list::-webkit-scrollbar {
            width: 4px;
        }
        #leaderboard-list::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        /* Shared Boxed Display Style */
        .boxed-display {
            display: inline-flex;
            height: 4.5rem;
            overflow: hidden;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 8px;
            padding: 0 12px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.6);
            align-items: center;
        }

        /* Rolling Counter specifics */
        .counter-digit {
            position: relative;
            width: 2.5rem;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        .digit-strip {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .digit-strip span, #timer-container {
            height: 4.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-weight: 900;
            color: #22d3ee;
            text-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
        }
        .digit-strip span {
            font-size: 3.5rem;
        }
        #timer-container {
            font-size: 2.5rem; 
            min-width: 8rem;
        }
        
        /* Mobile scaling to keep layout tight */
        @media (max-width: 640px) {
            .boxed-display {
                transform: scale(0.85);
                transform-origin: bottom;
            }
            #timer-container {
                font-size: 2rem;
                min-width: 6.5rem;
            }
        }

        /* Tab Styles */
        .tab-btn {
            padding: 6px 4px;
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            color: #64748b;
        }
        .tab-btn.active {
            color: #22d3ee;
            border-bottom-color: #22d3ee;
        }

        /* Mode Selection Styles */
        .mode-btn {
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            border: 1px solid #1e293b;
        }
        .mode-btn.active {
            background: #22d3ee;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        }
        
        .mode-btn.active #daily-countdown {
            color: #0f172a;
            opacity: 0.7;
        }

        .mode-btn:not(.active) {
            background: #0f172a;
            color: #64748b;
        }

        /* Disabled state */
        .mode-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: #1e293b !important;
            color: #475569 !important;
            box-shadow: none !important;
            filter: grayscale(1);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-950">

    <div class="w-full max-w-6xl flex flex-col md:flex-row items-center md:items-start justify-center gap-8 md:gap-12">
        
        <!-- Leaderboard Section -->
        <aside id="leaderboard-section" class="order-2 md:order-1 w-full md:w-72 lg:w-80 flex flex-col gap-6">
            
            <div class="text-center md:text-left">

            </div>

            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-700/50 neon-border flex-shrink-0">
                <h2 class="text-xl font-black text-cyan-400 italic mb-4 uppercase tracking-wider flex justify-between items-center">
                    Leaderboard

                </h2>

                <!-- Tabs -->
                <div class="flex justify-between border-b border-slate-800 mb-4 px-1">
                    <button onclick="setTab('all')" id="tab-all" class="tab-btn active">Global</button>
                    <button onclick="setTab('daily_race')" id="tab-daily_race" class="tab-btn">Daily Race</button>
                    <button onclick="setTab('personal')" id="tab-personal" class="tab-btn">Your Top</button>
                </div>

                <div id="leaderboard-list" class="space-y-2 font-mono text-sm max-h-[300px] md:max-h-[500px] overflow-y-auto pr-2">
                    <p class="text-slate-500 italic">Connecting...</p>
                </div>
                
                <button id="see-more-btn" onclick="expandLeaderboard()" class="hidden w-full mt-4 py-2 text-[10px] uppercase font-bold text-cyan-500/50 hover:text-cyan-400 border border-cyan-500/20 hover:border-cyan-500/50 rounded transition-all tracking-widest">

                            <div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
                        </div>
                        <div class="counter-digit" id="digit-10">
                            <div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
                        </div>
                        <div class="counter-digit" id="digit-1">
                            <div class="digit-strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span></div>
                        </div>

            <div id="canvas-container" class="relative w-full aspect-square bg-slate-900 rounded-xl p-1 md:p-2 border-2 border-slate-700 neon-border flex items-center justify-center overflow-hidden">
                <canvas id="mazeCanvas"></canvas>
                
                <div id="overlay" class="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center rounded-lg z-10 p-6">
                    <div id="start-screen" class="text-center w-full">
                        <h2 class="text-4xl font-black mb-6 text-cyan-400 italic uppercase">Select Mode</h2>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8 w-full max-w-sm mx-auto">
                            <button onclick="selectMode('classic')" id="mode-classic" class="mode-btn active p-6 flex flex-col items-center gap-2">
                                <span class="text-lg">Classic</span>
                                <span class="text-[9px] opacity-60 font-normal">Infinite Random Mazes</span>
                            </button>
                            <button onclick="selectMode('daily')" id="mode-daily" class="mode-btn p-6 flex flex-col items-center gap-2 relative">
                                <span class="text-lg">Daily Race</span>
                                <span id="daily-subtext" class="text-[9px] opacity-60 font-normal">Same for Everyone</span>

                            </button>
                        </div>

                        <button onclick="startGame()" class="px-12 py-4 bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black rounded-full transition-all transform hover:scale-105 active:scale-95 uppercase shadow-lg shadow-cyan-500/20">Enter Maze</button>

                            <button id="submit-btn" onclick="submitScore()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition-all disabled:opacity-50">Submit Score</button>
                        </div>

                        <button id="share-btn" onclick="shareScore()" class="w-full py-2 mb-6 bg-slate-800 hover:bg-slate-700 text-cyan-400 border border-slate-700 font-bold rounded-lg transition-all flex items-center justify-center gap-2 group">
                            <svg class="w-4 h-4 text-cyan-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                            Share Result
                        </button>

                        <button onclick="resetGame()" class="text-slate-400 hover:text-white uppercase text-xs font-bold tracking-widest underline underline-offset-4">Skip & Try Again</button>
                    </div>
                </div>
            </div>

            <footer class="mt-8 text-slate-500 text-[10px] text-center uppercase tracking-[0.2em] font-bold">
                Made By AVPxxd
            </footer>
            <footer class="mt-2 text-slate-600 text-[9px] text-center uppercase tracking-[0.1em] font-bold">
                Special Thanks To Mater, Branchy, & TheLocalAdmin For Bugfixing!
            </footer>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const githubConfig = {
            apiKey: "AIzaSyC8DJWDZ6gBArzoGpbQVVyTLSHiVM0KXTM",
            authDomain: "maze-speedrun-leaderboar-5c103.firebaseapp.com",
            projectId: "maze-speedrun-leaderboar-5c103",
            storageBucket: "maze-speedrun-leaderboar-5c103.firebasestorage.app",
            messagingSenderId: "548811736765",
            appId: "1:548811736765:web:15e9bbd69e297f55a0d9d4",
            measurementId: "G-BTRH8VYY3M"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maze-speedrun-global';
        let firebaseConfig = null;
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
            } else { firebaseConfig = githubConfig; }
        } catch (e) { console.error("Config error", e); }
        
        let app, auth, db;
        if (firebaseConfig && firebaseConfig.apiKey) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }
        
        let currentUser = null;
        let classicScores = [];
        let dailyScores = [];
        let leaderboardUnsubscribe = null;
        let dailyUnsubscribe = null;
        let leaderboardDisplayLimit = 10;
        let activeTab = 'all';
        let gameMode = 'classic'; 
        let hasPlayedDailyToday = false;

        const goalAudio = new Audio('goal.mp3');
        const warningAudio = new Audio('1sec.mp3');
        let playedWarningSound = false;

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getDailyCollectionTag() {
            return new Date().toISOString().split('T')[0].replace(/-/g, '_');
        }

        function seededRandom(seed) {
            let state = seed;
            return function() {
                state = (state * 1103515245 + 12345) % 2147483648;
                return state / 2147483648;
            };
        }

        let currentPrng = Math.random;

        function isNameClean(name) {
            if (!name || name.trim().length === 0) return false;
            const leetMap = {'0':'o', '1':'i', '2':'z', '3':'e', '4':'a', '5':'s', '6':'g', '7':'t', '8':'b', '9':'g', '@':'a', '$':'s', '!':'i', '+':'t', 'v':'u', 'x':'x', '(': 'c', '[': 'c', '{': 'c', '|': 'i', '*':'', '#':'', '%':'', '^':''};
            const normalized = name.toLowerCase().split('').map(c => leetMap[c] || c).join('').replace(/[^a-z0-9]/g, '');
            const badWords = ['fuck', 'shit', 'asshole', 'bitch', 'nigger', 'faggot', 'cunt', 'dick', 'pussy', 'slut', 'whore', 'retard', 'fag', 'nigga', 'bastard', 'cock', 'jerk', 'porn', 'sex', 'tit', 'boob', 'vagina', 'penis', 'cum', 'dumbass', 'jackass', 'motherfucker', 'twat', 'wanker', 'prick', 'bollocks', 'arse', 'chink', 'kike', 'spic', 'wetback', 'nazi', 'hitler', 'rape', 'pedo', 'homo', 'dyke', 'coon', 'jap', 'gook', 'negro', 'clit', 'labia', 'scrotum', 'twat', 'piss', 'shat', 'fart', 'boner'];
            for (const word of badWords) { if (normalized.includes(word)) return false; }
            return true;
        }

        const initAuth = async () => {
            if (!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else { await signInAnonymously(auth); }
            } catch (err) { console.error("Auth failed:", err); }
        };

        if (auth) {
            onAuthStateChanged(auth, async (user) => {
                currentUser = user;
                if (user) {
                    const statusDiv = document.getElementById('auth-status');
                    if (statusDiv) { statusDiv.innerText = "Connected Globally"; }
                    setupListeners();
                    checkDailyStatus();
                }
            });
            initAuth();
        }

        async function checkDailyStatus() {
            if (!db || !currentUser) return;
            const dailyDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'stats', 'daily');
            const snap = await getDoc(dailyDocRef);
            const todayStr = new Date().toISOString().split('T')[0];
            if (snap.exists() && snap.data().lastDailyPlayed === todayStr) {
                hasPlayedDailyToday = true;
                const modeDailyBtn = document.getElementById('mode-daily');
                const dailyCountdown = document.getElementById('daily-countdown');
                const dailySubtext = document.getElementById('daily-subtext');
                if (modeDailyBtn) { modeDailyBtn.disabled = true; modeDailyBtn.classList.remove('active'); }
                if (dailyCountdown) dailyCountdown.classList.remove('hidden');
                if (dailySubtext) dailySubtext.innerText = "Completed For Today";
                selectMode('classic');
            }
        }

        setInterval(() => {
            const now = new Date(), tomorrow = new Date();
            tomorrow.setUTCHours(24, 0, 0, 0);
            const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            const countdownEl = document.getElementById('daily-countdown');
            if (countdownEl) countdownEl.innerText = `NEXT RACE: ${h}:${m}:${s}`;
        }, 1000);

        window.selectMode = (mode) => {
            if (mode === 'daily' && hasPlayedDailyToday) return;
            gameMode = mode;
            document.getElementById('mode-classic').classList.toggle('active', mode === 'classic');
            document.getElementById('mode-daily').classList.toggle('active', mode === 'daily');
            if (mode === 'daily') { document.getElementById('daily-countdown').classList.add('hidden'); } 
            else if (hasPlayedDailyToday) { document.getElementById('daily-countdown').classList.remove('hidden'); }
        };

        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvas-container');
        const timerDisplay = document.getElementById('timer-container');
        const limitDisplay = document.getElementById('limit-display');
        const overlay = document.getElementById('overlay'), startScreen = document.getElementById('start-screen'), gameoverScreen = document.getElementById('gameover-screen');
        const finalLevelSpan = document.getElementById('final-level'), leaderboardList = document.getElementById('leaderboard-list'), loadingSpinner = document.getElementById('loading-spinner'), seeMoreBtn = document.getElementById('see-more-btn');

        const FIXED_MAZE_SIZE = 6;
        const INITIAL_TIME_LIMIT = 10;
        let level = 1, timeRemaining = 10, timeLimit = 10, mazeSize = FIXED_MAZE_SIZE, cellSize = 0, maze = [];
        let player = { x: 0, y: 0, visualX: 0, visualY: 0, trail: [], scaleX: 1, scaleY: 1 };
        let gameActive = false, lastTimestamp = 0;

        class Cell { constructor(r, c) { this.r = r; this.c = c; this.walls = [true, true, true, true]; this.visited = false; } }

        function updateCounterUI(val) {
            const levelStr = val.toString().padStart(3, '0');
            const huns = levelStr[0], tens = levelStr[1], ones = levelStr[2];
            const d100 = document.getElementById('digit-100'), d10 = document.getElementById('digit-10'), d1 = document.getElementById('digit-1');
            if (val >= 100 && d100) d100.style.display = 'block';
            if (d100) d100.style.transform = `translateY(-${huns * 4.5}rem)`;
            if (d10) d10.style.transform = `translateY(-${tens * 4.5}rem)`;
            if (d1) d1.style.transform = `translateY(-${ones * 4.5}rem)`;
        }

        function initCanvas() {
            if (!canvasContainer) return;
            const size = Math.max(200, Math.min(canvasContainer.clientWidth - 16, 500));
            canvas.width = size; canvas.height = size;
            cellSize = canvas.width / mazeSize;
        }

        function generateMaze(size) {
            mazeSize = size;
            cellSize = canvas.width / mazeSize;
            if (gameMode === 'daily') {
                const dateSeed = new Date().toISOString().split('T')[0].replace(/-/g, '');
                const seedVal = parseInt(dateSeed) + level;
                currentPrng = seededRandom(seedVal);
            } else { currentPrng = Math.random; }
            maze = Array.from({ length: size }, (_, r) => Array.from({ length: size }, (_, c) => new Cell(r, c)));
            let stack = []; let current = maze[0][0]; current.visited = true;
            while (true) {
                let neighbors = getUnvisitedNeighbors(current);
                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(currentPrng() * neighbors.length)];
                    removeWalls(current, next); stack.push(current);
                    next.visited = true; current = next;
                } else if (stack.length > 0) current = stack.pop();
                else break;
            }
            player.x = 0; player.y = 0; player.visualX = 0; player.visualY = 0; player.trail = [];
        }

        function getUnvisitedNeighbors(cell) {
            let neighbors = [], { r, c } = cell;
            if (r > 0 && !maze[r - 1][c].visited) neighbors.push(maze[r - 1][c]);
            if (r < mazeSize - 1 && !maze[r + 1][c].visited) neighbors.push(maze[r + 1][c]);
            if (c > 0 && !maze[r][c - 1].visited) neighbors.push(maze[r][c - 1]);
            if (c < mazeSize - 1 && !maze[r][c + 1].visited) neighbors.push(maze[r][c + 1]);
            return neighbors;
        }

        function removeWalls(a, b) {
            let dr = a.r - b.r, dc = a.c - b.c;
            if (dr === 1) { a.walls[0] = false; b.walls[2] = false; } else if (dr === -1) { a.walls[2] = false; b.walls[0] = false; }
            if (dc === 1) { a.walls[3] = false; b.walls[1] = false; } else if (dc === -1) { a.walls[1] = false; b.walls[3] = false; }
        }

        function draw() {
            if (!maze || maze.length === 0 || !maze[0] || cellSize <= 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#334155"; ctx.lineCap = "round"; ctx.lineWidth = Math.max(2, Math.floor(canvas.width / 80));
            for (let r = 0; r < mazeSize; r++) {
                for (let c = 0; c < mazeSize; c++) {
                    let x = c * cellSize, y = r * cellSize, cell = maze[r][c];
                    ctx.beginPath();
                    if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
                    if (cell.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
                    if (cell.walls[2]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); }
                    if (cell.walls[3]) { ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); }
                    ctx.stroke();
                }
            }
            const goalX = (mazeSize - 1) * cellSize + cellSize / 2, goalY = (mazeSize - 1) * cellSize + cellSize / 2;
            const timeNow = performance.now() / 1000, bobOffset = Math.sin(timeNow * 5) * (cellSize * 0.1); 
            ctx.save(); ctx.translate(goalX, goalY + bobOffset); ctx.fillStyle = "#fbbf24"; ctx.shadowBlur = 15; ctx.shadowColor = "#fbbf24";
            const s = cellSize * 0.3; ctx.beginPath(); ctx.moveTo(-s, -s); ctx.lineTo(s, -s); ctx.lineTo(s * 0.6, s * 0.5); ctx.lineTo(-s * 0.6, s * 0.5); ctx.closePath(); ctx.fill();
            ctx.fillRect(-s * 0.15, s * 0.5, s * 0.3, s * 0.3); ctx.fillRect(-s * 0.5, s * 0.8, s, s * 0.2);
            ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(-s * 0.8, -s * 0.4, s * 0.4, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(s * 0.8, -s * 0.4, s * 0.4, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
            player.trail.forEach((pos, i) => {
                const ratio = (player.trail.length - i) / player.trail.length, trailSize = cellSize * 0.7 * ratio;
                const tx = pos.x * cellSize + cellSize / 2, ty = pos.y * cellSize + cellSize / 2;
                ctx.globalAlpha = 0.3 * ratio; ctx.fillStyle = "#22d3ee";
                ctx.beginPath(); ctx.roundRect(tx - trailSize/2, ty - trailSize/2, trailSize, trailSize, 4); ctx.fill();
            });
            ctx.globalAlpha = 1.0;
            const px = player.visualX * cellSize + cellSize / 2, py = player.visualY * cellSize + cellSize / 2;
            ctx.save(); ctx.translate(px, py); ctx.scale(player.scaleX, player.scaleY);
            const pSize = cellSize * 0.7; ctx.fillStyle = "#22d3ee"; ctx.shadowBlur = 12; ctx.shadowColor = "#22d3ee";
            ctx.beginPath(); ctx.roundRect(-pSize/2, -pSize/2, pSize, pSize, 8); ctx.fill();
            ctx.restore();
        }

        window.startGame = function() {
            initCanvas(); level = 1; timeLimit = INITIAL_TIME_LIMIT; timeRemaining = timeLimit;
            overlay.classList.add('hidden'); startScreen.classList.add('hidden'); gameoverScreen.classList.add('hidden');
            generateMaze(FIXED_MAZE_SIZE); updateCounterUI(level);
            gameActive = true; lastTimestamp = performance.now();
            requestAnimationFrame(gameLoop);
        }

        window.resetGame = function() {
            overlay.classList.remove('hidden'); startScreen.classList.remove('hidden'); gameoverScreen.classList.add('hidden');
            document.getElementById('name-error').classList.add('hidden'); checkDailyStatus();
        }

        function nextLevel(first = false) {
            warningAudio.pause(); warningAudio.currentTime = 0; playedWarningSound = false;
            if (!first) {
                level++;
                if (level < 110) timeLimit = Math.max(3.0, 10.0 - ((level - 1) * 0.1));
                else if (level >= 250) timeLimit = 1.5;
                else { let step = Math.floor((level - 110) / 10); timeLimit = 2.9 - (step * 0.1); }
            }
            timeRemaining = timeLimit; updateCounterUI(level);
            if (limitDisplay) limitDisplay.innerText = timeLimit.toFixed(1);
            generateMaze(FIXED_MAZE_SIZE); draw();
        }

        function gameLoop(timestamp) {
            if (!gameActive) return;
            const delta = (timestamp - lastTimestamp) / 1000; lastTimestamp = timestamp;
            const lerpSpeed = 0.35; 
            player.visualX += (player.x - player.visualX) * lerpSpeed;
            player.visualY += (player.y - player.visualY) * lerpSpeed;
            const diffX = Math.abs(player.x - player.visualX), diffY = Math.abs(player.y - player.visualY);
            let targetScaleX = 1, targetScaleY = 1;
            if (diffX > 0.01) { targetScaleX = 1.3; targetScaleY = 0.7; } else if (diffY > 0.01) { targetScaleX = 0.7; targetScaleY = 1.3; }
            player.scaleX += (targetScaleX - player.scaleX) * 0.3; player.scaleY += (targetScaleY - player.scaleY) * 0.3;
            if (diffX > 0.001 || diffY > 0.001) {
                player.trail.unshift({x: player.visualX, y: player.visualY}); if (player.trail.length > 10) player.trail.pop();
            } else if (player.trail.length > 0) player.trail.pop();
            timeRemaining -= delta;
            if (timeRemaining <= 0) { timeRemaining = 0; updateUI(); endGame(); return; }
            updateUI(); draw(); requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            if (!timerDisplay) return; timerDisplay.innerText = timeRemaining.toFixed(2);
            if (timeRemaining < 3) {
                timerDisplay.style.color = "#ef4444"; timerDisplay.style.textShadow = "0 0 15px rgba(239, 68, 68, 0.6)";
                if (!playedWarningSound && gameActive) { warningAudio.play().catch(() => {}); playedWarningSound = true; }
            } else { timerDisplay.style.color = "#22d3ee"; timerDisplay.style.textShadow = "0 0 15px rgba(34, 211, 238, 0.6)"; }
        }

        function endGame() {
            gameActive = false; warningAudio.pause(); warningAudio.currentTime = 0;
            finalLevelSpan.innerText = level; overlay.classList.remove('hidden'); gameoverScreen.classList.remove('hidden');
            document.getElementById('submit-btn').disabled = false; document.getElementById('submit-btn').innerText = "Submit Score";
        }

        window.submitScore = async function() {
            if (!currentUser || !db) return;
            const name = document.getElementById('player-name').value.trim();
            const submitBtn = document.getElementById('submit-btn'), errorLabel = document.getElementById('name-error');
            if (!isNameClean(name)) { errorLabel.classList.remove('hidden'); return; }
            submitBtn.disabled = true; submitBtn.innerText = "Saving...";
            try {
                // Determine collection based on mode (reset strategy)
                const collectionName = gameMode === 'daily' ? `daily_race_${getDailyCollectionTag()}` : 'leaderboard';
                const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                await addDoc(scoresCol, { name: name, level: level, timestamp: Date.now(), uid: currentUser.uid, mode: gameMode });
                if (gameMode === 'daily') {
                    const todayStr = new Date().toISOString().split('T')[0];
                    const dailyDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'stats', 'daily');
                    await setDoc(dailyDocRef, { lastDailyPlayed: todayStr }, { merge: true });
                    hasPlayedDailyToday = true;
                }
                submitBtn.innerText = "Saved!"; setTimeout(() => resetGame(), 1000);
            } catch (e) { submitBtn.innerText = "Error!"; submitBtn.disabled = false; }
        }

        window.shareScore = function() {
            const shareText = `I reached Level ${level} in ${gameMode === 'daily' ? "Daily Race" : "Classic Run"} on Maze Speedrun! 🏁 https://games.damvan.ca`;
            if (navigator.share) { navigator.share({ title: 'Maze Speedrun', text: shareText }); } 
            else { copyToClipboardFallback(shareText, document.getElementById('share-btn')); }
        };

        function copyToClipboardFallback(text, button) {
            const input = document.createElement('textarea'); input.value = text; input.style.position = 'fixed'; input.style.opacity = '0';
            document.body.appendChild(input); input.select();
            try { document.execCommand('copy'); button.innerText = "Copied!"; setTimeout(() => button.innerText = "Share Result", 2000); } catch (err) {}
            document.body.removeChild(input);
        }

        function setupListeners() {
            if (!db) return;
            // Listener for Classic Leaderboard
            const classicCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            onSnapshot(classicCol, (snap) => {
                classicScores = snap.docs.map(d => d.data());
                updateLeaderboardUI();
            });
            // Listener for Daily Leaderboard
            const dailyCol = collection(db, 'artifacts', appId, 'public', 'data', `daily_race_${getDailyCollectionTag()}`);
            onSnapshot(dailyCol, (snap) => {
                dailyScores = snap.docs.map(d => d.data());
                const spinner = document.getElementById('loading-spinner');
                if (spinner) spinner.style.display = 'none';
                updateLeaderboardUI();
            });
        }

        window.setTab = function(tab) {
            activeTab = tab; leaderboardDisplayLimit = 10; 
            ['all','daily_race','personal'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t === tab));
            updateLeaderboardUI();
        };

        function updateLeaderboardUI() {
            if (!leaderboardList) return;
            let filtered = [];
            if (activeTab === 'daily_race') { filtered = [...dailyScores]; } 
            else if (activeTab === 'personal') { filtered = classicScores.filter(s => s.uid === currentUser.uid); } 
            else { filtered = [...classicScores]; }
            filtered.sort((a, b) => b.level - a.level || a.timestamp - b.timestamp);
            if (filtered.length === 0) {
                leaderboardList.innerHTML = `<p class="text-slate-500 italic text-center py-4">No scores found...</p>`;
                if (seeMoreBtn) seeMoreBtn.classList.add('hidden'); return;
            }
            leaderboardList.innerHTML = filtered.slice(0, leaderboardDisplayLimit).map((s, i) => `
                <div class="flex justify-between items-center py-2 border-b border-slate-800 last:border-0">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <span class="${i < 3 ? 'text-cyan-400 font-black' : 'text-slate-600'}">#${i + 1}</span>
                        <span class="text-slate-300 truncate font-bold">${escapeHTML(s.name || "Anon")}</span>
                    </div>
                    <span class="text-cyan-500 font-bold ml-2">Lvl ${s.level}</span>
                </div>`).join('');
            if (seeMoreBtn) seeMoreBtn.classList.toggle('hidden', filtered.length <= 10 || leaderboardDisplayLimit > 10);
        }

        window.expandLeaderboard = () => { leaderboardDisplayLimit = 50; updateLeaderboardUI(); };

        function movePlayer(dx, dy) {
            if (!gameActive) return;
            const cell = maze[player.y][player.x];
            if ((dx === 1 && cell.walls[1]) || (dx === -1 && cell.walls[3]) || (dy === 1 && cell.walls[2]) || (dy === -1 && cell.walls[0])) return;
            player.x += dx; player.y += dy;
            if (player.x === mazeSize - 1 && player.y === mazeSize - 1) {
                warningAudio.pause(); warningAudio.currentTime = 0; goalAudio.currentTime = 0; goalAudio.play().catch(() => {}); nextLevel();
            }
        }

        window.handleMobileMove = (dx, dy) => movePlayer(dx, dy);
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 'arrowup'].includes(key)) movePlayer(0, -1);
            if (['s', 'arrowdown'].includes(key)) movePlayer(0, 1);
            if (['a', 'arrowleft'].includes(key)) movePlayer(-1, 0);
            if (['d', 'arrowright'].includes(key)) movePlayer(1, 0);
        });
        const resizeObserver = new ResizeObserver(() => { window.requestAnimationFrame(() => { initCanvas(); if (maze && maze.length > 0) draw(); }); });
        window.onload = () => { initCanvas(); generateMaze(FIXED_MAZE_SIZE); draw(); updateCounterUI(1); resizeObserver.observe(canvasContainer); };
    </script>
</body>
</html>
