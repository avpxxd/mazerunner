<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Speedrun - Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            touch-action: none;
        }
        canvas {
            image-rendering: pixelated;
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.8), 0 0 20px rgba(34, 211, 238, 0.4);
        }
        .neon-border {
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }
        .control-btn {
            -webkit-tap-highlight-color: transparent;
        }
        #leaderboard-list::-webkit-scrollbar {
            width: 4px;
        }
        #leaderboard-list::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 bg-slate-950">

    <div class="w-full max-w-6xl flex flex-col md:flex-row items-center md:items-start justify-center gap-8 md:gap-12">
        
        <!-- Leaderboard Section -->
        <aside id="leaderboard-section" class="order-2 md:order-1 w-full md:w-72 lg:w-80 bg-slate-900/50 p-6 rounded-2xl border border-slate-700/50 neon-border flex-shrink-0">
            <h2 class="text-xl font-black text-cyan-400 italic mb-4 uppercase tracking-wider flex justify-between items-center">
                Global Top
                <span id="loading-spinner" class="text-[10px] normal-case font-normal text-slate-500 animate-pulse">Syncing...</span>
            </h2>
            <div id="leaderboard-list" class="space-y-2 font-mono text-sm max-h-[300px] md:max-h-[500px] overflow-y-auto pr-2">
                <p class="text-slate-500 italic">Connecting to servers...</p>
            </div>
            
            <!-- See More Button -->
            <button id="see-more-btn" onclick="expandLeaderboard()" class="hidden w-full mt-4 py-2 text-[10px] uppercase font-bold text-cyan-500/50 hover:text-cyan-400 border border-cyan-500/20 hover:border-cyan-500/50 rounded transition-all tracking-widest">
                See Top 50
            </button>

            <div id="auth-status" class="mt-4 p-2 rounded bg-slate-950/50 text-[10px] uppercase font-bold text-slate-600 tracking-widest text-center leading-tight min-h-[40px] flex items-center justify-center"></div>
        </aside>

        <!-- Game Section -->
        <main id="game-section" class="order-1 md:order-2 flex flex-col items-center w-full max-w-xl">
            <div id="game-ui" class="w-full mb-6 flex flex-col sm:flex-row justify-between items-center sm:items-end gap-4 px-1 text-center sm:text-left">
                <div class="flex-shrink-0">
                    <h1 class="text-3xl md:text-4xl font-black tracking-tighter neon-text uppercase italic leading-none">Maze Speedrun</h1>
                    <p class="text-slate-400 text-xs md:text-sm font-mono uppercase tracking-tighter mt-2">LEVEL: <span id="level-display" class="text-cyan-400">1</span></p>
                </div>
                <div class="sm:text-right flex-shrink-0">
                    <p class="text-[10px] md:text-xs text-slate-500 uppercase font-bold tracking-widest mb-1">TIME LIMIT: <span id="limit-display">10.0</span>s</p>
                    <div id="timer-container" class="text-5xl md:text-6xl font-mono font-bold text-cyan-400 tabular-nums leading-none">
                        10.00
                    </div>
                </div>
            </div>

            <div id="canvas-container" class="relative w-full aspect-square bg-slate-900 rounded-xl p-1 md:p-2 border-2 border-slate-700 neon-border flex items-center justify-center overflow-hidden">
                <canvas id="mazeCanvas"></canvas>
                
                <div id="overlay" class="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center rounded-lg z-10 p-6">
                    <div id="start-screen" class="text-center">
                        <h2 class="text-4xl font-black mb-4 text-cyan-400 italic">GO FAST</h2>
                        <p class="text-slate-300 mb-6 max-w-xs mx-auto text-sm leading-relaxed">Clear the 6x6 maze before time runs out.<br>The timer shrinks every level!</p>
                        <button onclick="startGame()" class="px-10 py-4 bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black rounded-full transition-all transform hover:scale-105 active:scale-95 uppercase shadow-lg shadow-cyan-500/20">Start Run</button>
                    </div>

                    <div id="gameover-screen" class="hidden text-center w-full max-w-xs">
                        <h2 class="text-5xl font-black mb-2 text-rose-500 italic">OUT OF TIME</h2>
                        <p class="text-slate-400 mb-6">You reached Level <span id="final-level" class="text-white font-bold text-xl">0</span></p>
                        
                        <div id="score-submission" class="mb-4 space-y-3">
                            <input type="text" id="player-name" maxlength="15" placeholder="Enter Name" class="w-full bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-center text-white focus:outline-none focus:border-cyan-400 transition-colors">
                            <div id="name-error" class="hidden text-rose-500 text-[10px] font-bold uppercase">Inappropriate name detected!</div>
                            <button id="submit-btn" onclick="submitScore()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-lg transition-all disabled:opacity-50">Submit Score</button>
                        </div>

                        <!-- Share Button -->
                        <button id="share-btn" onclick="shareScore()" class="w-full py-2 mb-6 bg-slate-800 hover:bg-slate-700 text-cyan-400 border border-slate-700 font-bold rounded-lg transition-all flex items-center justify-center gap-2 group">
                            <svg class="w-4 h-4 text-cyan-500 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                            Share Result
                        </button>

                        <button onclick="resetGame()" class="text-slate-400 hover:text-white uppercase text-xs font-bold tracking-widest underline underline-offset-4">Skip & Try Again</button>
                    </div>
                </div>
            </div>

            <!-- Mobile Controls -->
            <div id="mobile-controls" class="grid grid-cols-3 gap-3 mt-8 md:hidden">
                <div></div>
                <button onmousedown="handleMobileMove(0, -1)" ontouchstart="handleMobileMove(0, -1)" class="control-btn w-16 h-16 bg-slate-800 rounded-xl flex items-center justify-center border-b-4 border-slate-950 active:translate-y-1 active:border-b-0">
                    <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path></svg>
                </button>
                <div></div>
                <button onmousedown="handleMobileMove(-1, 0)" ontouchstart="handleMobileMove(-1, 0)" class="control-btn w-16 h-16 bg-slate-800 rounded-xl flex items-center justify-center border-b-4 border-slate-950 active:translate-y-1 active:border-b-0">
                    <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button onmousedown="handleMobileMove(0, 1)" ontouchstart="handleMobileMove(0, 1)" class="control-btn w-16 h-16 bg-slate-800 rounded-xl flex items-center justify-center border-b-4 border-slate-950 active:translate-y-1 active:border-b-0">
                    <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <button onmousedown="handleMobileMove(1, 0)" ontouchstart="handleMobileMove(1, 0)" class="control-btn w-16 h-16 bg-slate-800 rounded-xl flex items-center justify-center border-b-4 border-slate-950 active:translate-y-1 active:border-b-0">
                    <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <footer class="mt-8 text-slate-500 text-[10px] text-center uppercase tracking-[0.2em] font-bold">
                FIXED 6x6 GRID &bull; 0.1s reduction/level &bull; Min 1.0s
            </footer>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        /** * 🔥 Firebase Configuration
         */
        const githubConfig = {
            apiKey: "AIzaSyC8DJWDZ6gBArzoGpbQVVyTLSHiVM0KXTM",
            authDomain: "maze-speedrun-leaderboar-5c103.firebaseapp.com",
            projectId: "maze-speedrun-leaderboar-5c103",
            storageBucket: "maze-speedrun-leaderboar-5c103.firebasestorage.app",
            messagingSenderId: "548811736765",
            appId: "1:548811736765:web:15e9bbd69e297f55a0d9d4",
            measurementId: "G-BTRH8VYY3M"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maze-speedrun-global';
        let firebaseConfig = null;
        
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
            } else {
                firebaseConfig = githubConfig;
            }
        } catch (e) { console.error("Config error", e); }
        
        let app, auth, db;
        if (firebaseConfig && firebaseConfig.apiKey) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }
        
        let currentUser = null;
        let globalScores = [];
        let leaderboardUnsubscribe = null;
        let leaderboardDisplayLimit = 10;

        // Audio Objects
        const goalAudio = new Audio('goal.mp3');
        const warningAudio = new Audio('1sec.mp3');
        let playedWarningSound = false;

        // Profanity Filter
        const RESTRICTED_TERMS = [
            'fuck', 'shit', 'asshole', 'bitch', 'nigger', 'faggot', 'cunt', 'dick', 'pussy', 'slut', 'whore',
            'retard', 'fag', 'nigga', 'bastard', 'cock', 'jerk', 'porn', 'sex', 'tit', 'boob', 'vagina', 'penis',
            'cum', 'dumbass', 'jackass', 'motherfucker', 'twat', 'wanker', 'prick', 'bollocks', 'arse', 'chink',
            'kike', 'spic', 'wetback', 'nazi', 'hitler', 'rape', 'pedo', 'homo', 'dyke', 'coon', 'jap', 'gook',
            'negro', 'clit', 'labia', 'scrotum', 'twat', 'piss', 'shat', 'fart', 'boner'
        ];
        
        function isNameClean(name) {
            if (!name || name.trim().length === 0) return false;
            const leetMap = {
                '0':'o', '1':'i', '2':'z', '3':'e', '4':'a', '5':'s', '6':'g', '7':'t', '8':'b', '9':'g',
                '@':'a', '$':'s', '!':'i', '+':'t', 'v':'u', 'x':'x', '(': 'c', '[': 'c', '{': 'c', '|': 'i',
                '*':'', '#':'', '%':'', '^':''
            };
            const rawLower = name.toLowerCase();
            let translated = "";
            for (let char of rawLower) { translated += leetMap[char] || char; }
            const normalized = translated.replace(/[^a-z0-9]/g, '');
            const deduped = normalized.replace(/(.)\1+/g, '$1');
            const checkStrings = [normalized, deduped, rawLower.replace(/[^a-z0-9]/g, '')];
            for (const str of checkStrings) {
                if (str.length === 0) continue;
                for (const term of RESTRICTED_TERMS) { if (str.includes(term)) return false; }
            }
            return true;
        }

        const initAuth = async () => {
            if (!auth) return;
            const statusDiv = document.getElementById('auth-status');
            statusDiv.innerText = "Connecting Auth...";
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed:", err);
                const code = err.code || "unknown";
                if (code === 'auth/configuration-not-found') {
                    statusDiv.innerHTML = "<span class='text-rose-500'>Enable 'Anonymous' Auth in Firebase Console!</span>";
                } else {
                    statusDiv.innerText = "Auth Error: " + code;
                    statusDiv.className = "mt-4 text-[10px] uppercase font-bold text-rose-500 tracking-widest text-center";
                }
            }
        };

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) {
                    document.getElementById('auth-status').innerText = "Connected Globally";
                    document.getElementById('auth-status').className = "mt-4 text-[10px] uppercase font-bold text-cyan-500/50 tracking-widest text-center";
                    if (!leaderboardUnsubscribe) setupLeaderboardListener();
                }
            });
            initAuth();
        } else {
            document.getElementById('leaderboard-list').innerHTML = `<div class="text-slate-500 text-xs italic space-y-2"><p>Global features unavailable.</p></div>`;
            document.getElementById('loading-spinner').style.display = 'none';
        }

        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const canvasContainer = document.getElementById('canvas-container');
        const timerDisplay = document.getElementById('timer-container');
        const levelDisplay = document.getElementById('level-display');
        const limitDisplay = document.getElementById('limit-display');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const finalLevelSpan = document.getElementById('final-level');
        const leaderboardList = document.getElementById('leaderboard-list');
        const loadingSpinner = document.getElementById('loading-spinner');
        const seeMoreBtn = document.getElementById('see-more-btn');

        const FIXED_MAZE_SIZE = 6;
        const INITIAL_TIME_LIMIT = 10;
        let level = 1;
        let timeRemaining = 10;
        let timeLimit = 10;
        let mazeSize = FIXED_MAZE_SIZE;
        let cellSize = 0;
        let maze = [];
        let player = { x: 0, y: 0 };
        let gameActive = false;
        let lastTimestamp = 0;

        class Cell {
            constructor(r, c) {
                this.r = r; this.c = c;
                this.walls = [true, true, true, true];
                this.visited = false;
            }
        }

        function initCanvas() {
            let containerWidth = canvasContainer.clientWidth;
            if (containerWidth <= 0) { containerWidth = Math.min(window.innerWidth - 64, 500); }
            const size = Math.max(200, Math.min(containerWidth - 16, 500));
            canvas.width = size; canvas.height = size;
            cellSize = canvas.width / mazeSize;
        }

        function generateMaze(size) {
            mazeSize = size;
            cellSize = canvas.width / mazeSize;
            maze = Array.from({ length: size }, (_, r) => Array.from({ length: size }, (_, c) => new Cell(r, c)));
            let stack = [];
            let current = maze[0][0];
            current.visited = true;
            while (true) {
                let neighbors = getUnvisitedNeighbors(current);
                if (neighbors.length > 0) {
                    let next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    removeWalls(current, next);
                    stack.push(current);
                    next.visited = true;
                    current = next;
                } else if (stack.length > 0) current = stack.pop();
                else break;
            }
            player = { x: 0, y: 0 };
        }

        function getUnvisitedNeighbors(cell) {
            let neighbors = [];
            let { r, c } = cell;
            if (r > 0 && !maze[r - 1][c].visited) neighbors.push(maze[r - 1][c]);
            if (r < mazeSize - 1 && !maze[r + 1][c].visited) neighbors.push(maze[r + 1][c]);
            if (c > 0 && !maze[r][c - 1].visited) neighbors.push(maze[r][c - 1]);
            if (c < mazeSize - 1 && !maze[r][c + 1].visited) neighbors.push(maze[r][c + 1]);
            return neighbors;
        }

        function removeWalls(a, b) {
            let dr = a.r - b.r; let dc = a.c - b.c;
            if (dr === 1) { a.walls[0] = false; b.walls[2] = false; }
            else if (dr === -1) { a.walls[2] = false; b.walls[0] = false; }
            if (dc === 1) { a.walls[3] = false; b.walls[1] = false; }
            else if (dc === -1) { a.walls[1] = false; b.walls[3] = false; }
        }

        function draw() {
            if (cellSize <= 0) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#334155";
            ctx.lineCap = "round";
            ctx.lineWidth = Math.max(2, Math.floor(canvas.width / 80));
            for (let r = 0; r < mazeSize; r++) {
                for (let c = 0; c < mazeSize; c++) {
                    let x = c * cellSize; let y = r * cellSize;
                    let cell = maze[r][c];
                    ctx.beginPath();
                    if (cell.walls[0]) { ctx.moveTo(x, y); ctx.lineTo(x + cellSize, y); }
                    if (cell.walls[1]) { ctx.moveTo(x + cellSize, y); ctx.lineTo(x + cellSize, y + cellSize); }
                    if (cell.walls[2]) { ctx.moveTo(x, y + cellSize); ctx.lineTo(x + cellSize, y + cellSize); }
                    if (cell.walls[3]) { ctx.moveTo(x, y); ctx.lineTo(x, y + cellSize); }
                    ctx.stroke();
                }
            }
            const padding = cellSize * 0.15;
            ctx.fillStyle = "#22c55e";
            ctx.shadowBlur = 15; ctx.shadowColor = "#22c55e";
            ctx.beginPath();
            ctx.roundRect((mazeSize - 1) * cellSize + padding, (mazeSize - 1) * cellSize + padding, cellSize - (padding * 2), cellSize - (padding * 2), 8);
            ctx.fill();
            ctx.shadowBlur = 0;
            const pPadding = cellSize * 0.2;
            ctx.fillStyle = "#22d3ee";
            ctx.shadowBlur = 12; ctx.shadowColor = "#22d3ee";
            ctx.beginPath();
            ctx.roundRect(player.x * cellSize + pPadding, player.y * cellSize + pPadding, cellSize - (pPadding * 2), cellSize - (pPadding * 2), 10);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        window.startGame = function() {
            initCanvas();
            level = 1;
            timeLimit = INITIAL_TIME_LIMIT;
            timeRemaining = timeLimit;
            overlay.classList.add('hidden');
            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');
            nextLevel(true);
            gameActive = true;
            lastTimestamp = performance.now();
            requestAnimationFrame(gameLoop);
        }

        window.resetGame = function() {
            overlay.classList.remove('hidden');
            startScreen.classList.remove('hidden');
            gameoverScreen.classList.add('hidden');
            document.getElementById('name-error').classList.add('hidden');
        }

        function nextLevel(first = false) {
            // Ensure warning audio stops when moving to next level
            warningAudio.pause();
            warningAudio.currentTime = 0;
            playedWarningSound = false;
            
            if (!first) {
                level++;
                timeLimit = Math.max(1.0, INITIAL_TIME_LIMIT - ((level - 1) * 0.1));
            }
            timeRemaining = timeLimit;
            levelDisplay.innerText = level;
            limitDisplay.innerText = timeLimit.toFixed(1);
            generateMaze(FIXED_MAZE_SIZE);
            draw();
        }

        function gameLoop(timestamp) {
            if (!gameActive) return;
            const delta = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;
            timeRemaining -= delta;
            if (timeRemaining <= 0) {
                timeRemaining = 0;
                updateUI();
                endGame();
                return;
            }
            updateUI();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            timerDisplay.innerText = timeRemaining.toFixed(2);
            
            if (timeRemaining < 1) {
                timerDisplay.className = "text-5xl md:text-6xl font-mono font-bold text-rose-500 tabular-nums";
                if (!playedWarningSound && gameActive) {
                    warningAudio.play().catch(e => console.log("Audio play blocked by browser"));
                    playedWarningSound = true;
                }
            } else {
                timerDisplay.className = "text-5xl md:text-6xl font-mono font-bold text-cyan-400 tabular-nums";
            }
        }

        function endGame() {
            gameActive = false;
            // Stop warning audio on game end
            warningAudio.pause();
            warningAudio.currentTime = 0;
            
            finalLevelSpan.innerText = level;
            overlay.classList.remove('hidden');
            gameoverScreen.classList.remove('hidden');
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "Submit Score";
            document.getElementById('share-btn').innerText = "Share Result";
        }

        window.submitScore = async function() {
            if (!currentUser || !db) return;
            const name = document.getElementById('player-name').value.trim();
            const submitBtn = document.getElementById('submit-btn');
            const errorLabel = document.getElementById('name-error');
            errorLabel.classList.add('hidden');
            if (!isNameClean(name)) { errorLabel.classList.remove('hidden'); return; }
            submitBtn.disabled = true;
            submitBtn.innerText = "Saving...";
            try {
                const scoresCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                await addDoc(scoresCol, { name: name, level: level, timestamp: Date.now() });
                submitBtn.innerText = "Saved!";
                setTimeout(() => resetGame(), 1000);
            } catch (e) {
                submitBtn.innerText = "Error!";
                submitBtn.disabled = false;
            }
        }

        window.shareScore = function() {
            const currentLevel = document.getElementById('final-level').innerText;
            const shareText = `I just got a new High Score of ${currentLevel} on Maze Speedrun! Check it out at https://games.damvan.ca`;
            const shareBtn = document.getElementById('share-btn');
            if (navigator.share) {
                navigator.share({ title: 'Maze Speedrun', text: shareText }).catch(() => { copyToClipboardFallback(shareText, shareBtn); });
            } else { copyToClipboardFallback(shareText, shareBtn); }
        };

        function copyToClipboardFallback(text, button) {
            const input = document.createElement('textarea');
            input.value = text;
            input.style.position = 'fixed'; input.style.opacity = '0';
            document.body.appendChild(input);
            input.select();
            try {
                document.execCommand('copy');
                const original = button.innerText;
                button.innerText = "Copied to Clipboard!";
                setTimeout(() => button.innerText = original, 2000);
            } catch (err) { console.error('Copy failed', err); }
            document.body.removeChild(input);
        }

        function setupLeaderboardListener() {
            if (!db) return;
            const leaderboardCol = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            leaderboardUnsubscribe = onSnapshot(leaderboardCol, (snapshot) => {
                loadingSpinner.style.display = 'none';
                const scores = [];
                snapshot.forEach(doc => scores.push(doc.data()));
                scores.sort((a, b) => b.level - a.level || a.timestamp - b.timestamp);
                globalScores = scores;
                updateLeaderboardUI();
            }, (err) => {
                loadingSpinner.style.display = 'none';
                if (err.code === 'permission-denied') {
                    leaderboardList.innerHTML = `<p class="text-rose-500 italic text-xs leading-tight">Database Rules Error.<br>Check Firestore Rules!</p>`;
                } else {
                    leaderboardList.innerHTML = `<p class="text-rose-500 italic text-xs">Sync Error: ${err.code}</p>`;
                }
            });
        }

        function updateLeaderboardUI() {
            if (globalScores.length === 0) {
                leaderboardList.innerHTML = `<p class="text-slate-500 italic">No global runs yet...</p>`;
                seeMoreBtn.classList.add('hidden');
                return;
            }
            
            const displayScores = globalScores.slice(0, leaderboardDisplayLimit);
            const h2 = document.querySelector('#leaderboard-section h2');
            h2.innerHTML = `Global Top ${leaderboardDisplayLimit} <span id="loading-spinner" class="text-[10px] normal-case font-normal text-slate-500 animate-pulse" style="display:none">Syncing...</span>`;

            leaderboardList.innerHTML = displayScores.map((s, i) => `
                <div class="flex justify-between items-center py-2 border-b border-slate-800 last:border-0">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <span class="${i < 3 ? 'text-cyan-400 font-black' : 'text-slate-600'}">#${i + 1}</span>
                        <span class="text-slate-300 truncate font-bold">${s.name}</span>
                    </div>
                    <span class="text-cyan-500 font-bold ml-2">Lvl ${s.level}</span>
                </div>
            `).join('');

            if (globalScores.length > 10 && leaderboardDisplayLimit === 10) {
                seeMoreBtn.classList.remove('hidden');
            } else {
                seeMoreBtn.classList.add('hidden');
            }
        }

        window.expandLeaderboard = function() {
            leaderboardDisplayLimit = 50;
            updateLeaderboardUI();
        }

        function movePlayer(dx, dy) {
            if (!gameActive) return;
            const cell = maze[player.y][player.x];
            if ((dx === 1 && cell.walls[1]) || (dx === -1 && cell.walls[3]) || (dy === 1 && cell.walls[2]) || (dy === -1 && cell.walls[0])) return;
            player.x += dx; player.y += dy;
            
            if (player.x === mazeSize - 1 && player.y === mazeSize - 1) {
                // Goal reached: Stop the 1sec warning audio immediately
                warningAudio.pause();
                warningAudio.currentTime = 0;
                
                goalAudio.currentTime = 0;
                goalAudio.play().catch(e => console.log("Audio play blocked by browser"));
                nextLevel();
            }
        }

        window.handleMobileMove = (dx, dy) => movePlayer(dx, dy);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 'arrowup'].includes(key)) movePlayer(0, -1);
            if (['s', 'arrowdown'].includes(key)) movePlayer(0, 1);
            if (['a', 'arrowleft'].includes(key)) movePlayer(-1, 0);
            if (['d', 'arrowright'].includes(key)) movePlayer(1, 0);
        });

        const resizeObserver = new ResizeObserver(() => { initCanvas(); draw(); });
        resizeObserver.observe(canvasContainer);

        window.onload = () => { initCanvas(); generateMaze(FIXED_MAZE_SIZE); draw(); };
    </script>
</body>
</html>
